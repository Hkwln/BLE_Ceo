[env:seeeduino_xiao_esp32s3]
platform = espressif32
board = seeeduino_xiao_esp32s3
framework = arduino
monitor_speed = 115200

# Libraries
lib_deps = 
    # BLE Libraries (built-in with Arduino framework)
    # bluedroid
    # BLEUtils
    # BLE2902
    # I2S support (built-in)

# Build flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -I${PROJECT_LIBDEPS_DIR}/${PIOENV}

# Serial port (adjust if needed)
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
